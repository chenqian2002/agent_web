<!DOCTYPE html> 
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <!-- 增加移动端视口设置，让手机端显示更完美 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent 个人网站</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    
    <div class="container">
        <!-- 导航栏 -->
        <nav>
            <div class="logo">🤖 AI Agent</div>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/chat">聊天</a>
                <a href="/docsqa">文件问答</a>
                <a href="/about">关于我</a>
            </div>
        </nav>

        <!-- 悬浮客服图标 -->
        <div id="chat-widget-btn" onclick="toggleChatWidget()">
            🤖
        </div>

        <!-- 客服聊天窗口 (默认隐藏) -->
        <div id="chat-widget-window" style="display: none;">
            <div class="chat-header">
                <div class="header-title">
                    <span class="status-dot"></span>
                    智能客服 Agent
                </div>
                <span class="close-btn" onclick="toggleChatWidget()">×</span>
            </div>
            <div id="widget-messages">
                <div class="message bot">
                    <div class="message-content">你好！我是智能客服，我可以查文档也可以搜网上的信息，请问有什么可以帮你？✨</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="widget-input" placeholder="输入问题，按回车发送..." onkeypress="handleWidgetKeyPress(event)">
                <button onclick="sendWidgetMessage()">
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

        <!-- 主要内容区 -->
        <div class="card fade-in">
            <div class="icon-header">🔍</div>
            <h1>AI 搜索助手</h1>
            <p class="subtitle">输入问题，让 AI Agent 帮你搜索全网答案</p>
            
            <form action="/search" method="post" class="search-box">
                <input class="search-input" type="text" name="query" placeholder="输入你想搜索的内容..." required>
                <button type="submit" class="search-btn">开始探索</button>
            </form>
            
            <div class="result-box">
                <h3>📋 搜索结果</h3>
                <div class="result-content">
                    {% if result %}
                        <pre>{{ result }}</pre>
                    {% else %}
                        <div class="placeholder-box">
                            <span class="placeholder-icon">👆</span>
                            <p class="placeholder">在上方输入问题开始搜索</p>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载动画 -->
    <div id="loading" class="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <p>正在搜寻全网资讯...</p>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer>
        <p>© 2026 AI Agent 个人网站 | Made with ❤️</p>
        <div class="footer-links">
            <a href="/">首页</a>
            <a href="/chat">聊天</a>
            <a href="/docsqa">文件问答</a>
            <a href="/about">关于我</a>
        </div>
    </footer>
    
    <script src="/static/script.js"></script>
</body>
</html>
